<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEVA Productivity Leaderboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --ceva-blue: #002D72;
            --ceva-red: #E31837;
            --ceva-white: #FFFFFF;
            --bg-dark: #050a12;
        }

        body { 
            background-color: var(--bg-dark);
            color: var(--ceva-white);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Vital for TV displays */
        }

        /* Top Brand Bar */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--ceva-white);
            padding: 10px 40px;
            border-radius: 10px;
            border-bottom: 6px solid var(--ceva-red);
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .header-title h1 { 
            color: var(--ceva-blue); 
            margin: 0; 
            font-weight: 900; 
            font-size: 2.2rem;
            text-transform: uppercase;
        }

        .ceva-logo { height: 60px; }

        /* Dashboard Container */
        .dashboard-main {
            display: flex;
            flex: 1; /* Fills remaining height */
            gap: 20px;
            min-height: 0; /* Important for child height calculation */
        }

        /* Left Panel: Chart & Controls */
        .left-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 0;
        }

        /* Right Panel: The Table */
        .right-panel {
            flex: 0.8;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto; /* Allow scrolling only inside the table if needed */
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            flex: 1; /* Grows to fill space */
            position: relative; /* Container for Chart.js */
        }

        .control-card {
            background: var(--ceva-blue);
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid var(--ceva-red);
        }

        /* Table Styling */
        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        th { 
            background-color: var(--ceva-blue); 
            color: white; 
            text-transform: uppercase; 
            padding: 12px;
            font-size: 0.9rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td { padding: 10px; background: rgba(255,255,255,0.03); font-size: 1.1rem; }
        
        .rank-1 { background: rgba(227, 24, 55, 0.8) !important; color: white; font-weight: bold; }
        .rank-2, .rank-3 { background: rgba(0, 45, 114, 0.6) !important; }
        .total-col { color: #00d4ff; font-weight: bold; text-align: right; }

        #last-update { font-size: 1rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-title">
        <h1>Millington Performance</h1>
        <div id="last-update">Syncing Data...</div>
    </div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/14/CEVA_Logistics_logo.svg" class="ceva-logo" alt="CEVA Logo">
</div>

<div class="dashboard-main">
    <div class="left-panel">
        <div class="chart-card">
            <h4 class="mb-3 fw-bold" style="color: var(--ceva-red);">Hourly Volume Trends</h4>
            <div style="height: calc(100% - 40px); width: 100%;">
                <canvas id="productivityChart"></canvas>
            </div>
        </div>
        
        <div class="control-card">
            <div class="row align-items-center">
                <div class="col-6">
                    <label class="small text-uppercase mb-1 fw-bold">Supervisor Filter</label>
                    <select id="supervisorFilter" class="form-select bg-dark text-white border-secondary"></select>
                </div>
                <div class="col-6 text-end">
                    <p class="m-0 small">CEVA Logistics | Proprietary Data</p>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Associate</th>
                    <th>Supv</th>
                    <th style="text-align: right;">Total</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQSCLwK71k52Yc_Sfnz3qzycsuHKn23n7ywFNEWzowh2jYCpfS23jpwz0po4E3b_OdLt6fkNAN-JEVU/pub?gid=0&single=true&output=csv';
    const excludedNames = ["System Admin", "Internal Test"];
    const hourLabels = ["4a", "5a", "6a", "7a", "8a", "9a", "10a", "11a", "12p", "1p", "2p", "3p", "4p", "5p", "6p", "7p", "8p", "9p", "10p", "11p", "12a", "1a", "2a", "3a"];

    let myChart;

    function initDashboard() {
        fetch(csvUrl).then(res => res.text()).then(csvText => {
            Papa.parse(csvText, {
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    processData(results.data.slice(1));
                    setTimeout(initDashboard, 300000); 
                }
            });
        }).catch(err => console.error("Sync error:", err));
    }

    function processData(rawData) {
        const supervisors = new Set();
        let teamTotals = new Array(24).fill(0);
        let filteredData = rawData.filter(row => row[2] && !excludedNames.includes(row[2]));
        
        filteredData.sort((a, b) => (parseFloat(b[29]) || 0) - (parseFloat(a[29]) || 0));

        let tableHtml = "";
        filteredData.forEach((row, index) => {
            supervisors.add(row[4]);
            for (let j = 5; j <= 28; j++) {
                teamTotals[j-5] += (parseFloat(row[j]) || 0);
            }

            let rankClass = (index === 0) ? 'rank-1' : (index < 3) ? 'rank-2' : '';
            tableHtml += `<tr class="${rankClass}">
                <td style="width: 60px;">${index + 1}</td>
                <td>${row[2]}</td>
                <td>${row[4] || ''}</td>
                <td class="total-col">${row[29]}</td>
            </tr>`;
        });

        $('#tableBody').html(tableHtml);
        $('#last-update').text("Last Update: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
        
        // Refresh Supervisor Dropdown only if it's empty
        if($('#supervisorFilter').children().length === 0) {
            $('#supervisorFilter').append('<option value="">All Supervisors</option>');
            supervisors.forEach(s => s && $('#supervisorFilter').append(`<option value="${s}">${s}</option>`));
        }

        renderChart(hourLabels, teamTotals);
    }

    function renderChart(labels, data) {
        if (myChart) myChart.destroy();
        const ctx = document.getElementById('productivityChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ 
                    data: data, 
                    borderColor: '#E31837', 
                    backgroundColor: 'rgba(227, 24, 55, 0.15)', 
                    fill: true, 
                    tension: 0.4,
                    pointRadius: 2,
                    borderWidth: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { 
                        beginAtZero: true,
                        ticks: { color: '#888', font: { size: 14 } }, 
                        grid: { color: 'rgba(255,255,255,0.05)' } 
                    },
                    x: { 
                        ticks: { color: '#888', font: { size: 14 } }, 
                        grid: { display: false } 
                    }
                }
            }
        });
    }

    $(document).ready(initDashboard);
</script>
</body>
</html>
