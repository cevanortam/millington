<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEVA Productivity Leaderboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --ceva-blue: #002D72;
            --ceva-red: #E31837;
            --ceva-white: #FFFFFF;
            --bg-dark: #050a12;
        }

        html, body { 
            height: 100vh; width: 100vw; margin: 0; padding: 0;
            background-color: var(--bg-dark); color: var(--ceva-white);
            font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
        }

        body { display: flex; flex-direction: column; padding: 1vh; }

        .header-container {
            height: 10vh; display: flex; justify-content: space-between; align-items: center;
            background: var(--ceva-white); padding: 0 40px; border-radius: 10px;
            border-bottom: 6px solid var(--ceva-red); margin-bottom: 1vh; flex-shrink: 0;
        }

        .header-title h1 { color: var(--ceva-blue); margin: 0; font-weight: 900; font-size: 3.5vh; text-transform: uppercase; }
        .ceva-logo { height: 6vh; width: auto; max-width: 250px; object-fit: contain; }

        .dashboard-main { display: flex; flex: 1; gap: 1vw; min-height: 0; }

        .left-panel { flex: 0.6; display: flex; flex-direction: column; gap: 1vh; min-height: 0; }
        .right-panel { flex: 0.4; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 1vh; display: flex; flex-direction: column; min-height: 0; }

        .chart-card { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 2vh; position: relative; min-height: 0; }
        .control-card { height: 8vh; background: var(--ceva-blue); padding: 1vh 2vh; border-radius: 12px; border-left: 5px solid var(--ceva-red); flex-shrink: 0; }

        .table-container { flex: 1; overflow-y: auto; min-height: 0; }
        .table-container::-webkit-scrollbar { width: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: var(--ceva-red); border-radius: 10px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        th { background-color: var(--ceva-blue); color: white; text-transform: uppercase; padding: 1vh; font-size: 1.4vh; position: sticky; top: 0; z-index: 10; }
        td { padding: 1vh; background: rgba(255,255,255,0.03); font-size: 1.6vh; cursor: pointer; transition: 0.2s; border: none; }
        td:hover { background: rgba(255,255,255,0.1); }
        
        .rank-1 { background: var(--ceva-red) !important; color: white; font-weight: bold; }
        .rank-2, .rank-3 { background: rgba(0, 45, 114, 0.8) !important; }
        .total-col { color: #00d4ff; font-weight: bold; text-align: right; }

        .omit-tag { background: var(--ceva-red); color: white; padding: 2px 8px; border-radius: 4px; margin: 2px; display: inline-block; font-size: 1.2vh; }
        .omit-tag span { cursor: pointer; margin-left: 5px; font-weight: bold; }
        .modal-content { background-color: #1a1a1a; color: white; border: 1px solid var(--ceva-red); }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-title">
        <h1 id="mainHeader">Millington Performance</h1>
        <div id="last-update" style="font-size: 1.4vh; color: #666; font-weight: bold;">Initializing...</div>
    </div>
    <img src="https://www.cevalogistics.com/public-cdn/images-spx/x_large_picture/CEVA_BlueRed.png" class="ceva-logo" alt="CEVA Logo">
</div>

<div class="dashboard-main">
    <div class="left-panel">
        <div class="chart-card">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h4 id="chartTitle" style="color: var(--ceva-red); font-weight: bold; margin: 0; font-size: 2vh;">Hourly Volume Trends</h4>
                <button class="btn btn-sm btn-outline-light" onclick="resetToTeam()" style="font-size: 1vh;">Reset View</button>
            </div>
            <div style="position: absolute; top: 7vh; left: 1vh; right: 1vh; bottom: 1vh;">
                <canvas id="productivityChart"></canvas>
            </div>
        </div>
        
        <div class="control-card">
            <div class="row align-items-center h-100">
                <div class="col-4">
                    <label class="small text-uppercase fw-bold d-block" style="font-size: 1vh; color: #ccc;">Supervisor Filter</label>
                    <select id="supervisorFilter" class="form-select form-select-sm bg-dark text-white border-secondary"></select>
                </div>
                <div class="col-8 text-end">
                    <button class="btn btn-sm btn-danger me-2" data-bs-toggle="modal" data-bs-target="#omitModal" style="font-size: 1.2vh;">Manage Exclusions</button>
                    <span class="small opacity-50" style="font-size: 1.2vh;">Click name to graph performance</span>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="table-container">
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Associate</th>
                        <th>Supv</th>
                        <th style="text-align: right;">Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="omitModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Exclude User Names</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="input-group mb-3">
                    <input type="text" id="omitInput" class="form-control" placeholder="Enter Exact Name">
                    <button class="btn btn-primary" onclick="addOmission()">Add</button>
                </div>
                <div id="omitList" class="p-2 border border-secondary rounded"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQSCLwK71k52Yc_Sfnz3qzycsuHKn23n7ywFNEWzowh2jYCpfS23jpwz0po4E3b_OdLt6fkNAN-JEVU/pub?gid=0&single=true&output=csv';
    const hourLabels = ["4a", "5a", "6a", "7a", "8a", "9a", "10a", "11a", "12p", "1p", "2p", "3p", "4p", "5p", "6p", "7p", "8p", "9p", "10p", "11p", "12a", "1a", "2a", "3a"];
    
    let myChart, associateMap = {}, teamTotals = [], fullDataBackup = [];
    let excludedNames = JSON.parse(localStorage.getItem('cevaExclusions')) || [];

    function initDashboard() {
        fetch(csvUrl).then(res => res.text()).then(csvText => {
            Papa.parse(csvText, {
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    fullDataBackup = results.data;
                    renderOmitList();
                    processData();
                    setTimeout(initDashboard, 300000); 
                }
            });
        });
    }

    function processData() {
        const supervisors = new Set();
        teamTotals = new Array(24).fill(0);
        associateMap = {};
        const selectedSupv = $('#supervisorFilter').val();

        // New Mapping Logic:
        // Col A (0) = ID, Col B (1) = User Name, Col C (2) = Supv ID, Col D (3) = Supv Name
        // Col E (4) = 4am ... Col AC (28) = Total

        let cleanedData = fullDataBackup.filter(row => {
            const name = row[1] ? row[1].trim() : ""; // User Name is now Column B (Index 1)
            return name && 
                   !["Associate", "Name", "ASSOCIATE", "USER NAME", "USER_NAME"].includes(name.toUpperCase()) && 
                   !excludedNames.includes(name);
        });

        if (selectedSupv) {
            cleanedData = cleanedData.filter(row => row[3] === selectedSupv); // Supv Name is now Column D (Index 3)
        }

        // Sort by Total (Column AC = Index 28)
        cleanedData.sort((a, b) => (parseFloat(b[28]) || 0) - (parseFloat(a[28]) || 0));

        let tableHtml = "";
        cleanedData.forEach((row, index) => {
            const associateName = row[1];
            const supvName = row[3];
            const totalVal = parseFloat(row[28]) || 0;

            supervisors.add(supvName);
            
            let pData = [];
            // Map hourly productivity (Cols E through AB = Indices 4 through 27)
            for (let j = 4; j <= 27; j++) {
                let val = parseFloat(row[j]) || 0;
                pData.push(val);
                teamTotals[j-4] += val;
            }
            associateMap[associateName] = pData;

            let rankClass = (index === 0) ? 'rank-1' : (index < 3) ? 'rank-2' : '';
            
            tableHtml += `<tr class="${rankClass}" onclick="updateChartForAssociate('${associateName}')">
                <td style="width: 10%;">${index + 1}</td>
                <td style="width: 50%;">${associateName}</td>
                <td style="width: 25%;">${supvName || ''}</td>
                <td class="total-col" style="width: 15%;">${totalVal}</td>
            </tr>`;
        });

        $('#tableBody').html(tableHtml);
        $('#last-update').text("Last Update: " + new Date().toLocaleTimeString());
        
        if($('#supervisorFilter').children().length <= 1) {
            const allSupvs = new Set(fullDataBackup.map(r => r[3]).filter(s => s && !["SUPERVISOR", "SUPV NAME", "NAME"].includes(s.toUpperCase())));
            $('#supervisorFilter').html('<option value="">Full Building</option>');
            Array.from(allSupvs).sort().forEach(s => $('#supervisorFilter').append(`<option value="${s}">${s}</option>`));
        }

        resetToTeam();
    }

    function updateChartForAssociate(name) {
        $('#chartTitle').text(name + " Individual Performance");
        renderChart(hourLabels, associateMap[name], '#FFFFFF');
    }

    function resetToTeam() {
        const supvLabel = $('#supervisorFilter').val() || "Building";
        $('#chartTitle').text(supvLabel + " Hourly Flow");
        renderChart(hourLabels, teamTotals, '#E31837');
    }

    function renderChart(labels, data, color) {
        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('productivityChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ 
                    data: data, borderColor: color, backgroundColor: color === '#FFFFFF' ? 'rgba(255,255,255,0.1)' : 'rgba(227, 24, 55, 0.2)', 
                    fill: true, tension: 0.4, pointRadius: 4, borderWidth: 5 
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } }, x: { ticks: { color: '#888' }, grid: { display: false } } } }
        });
    }

    function addOmission() {
        const name = $('#omitInput').val().trim();
        if (name && !excludedNames.includes(name)) {
            excludedNames.push(name);
            localStorage.setItem('cevaExclusions', JSON.stringify(excludedNames));
            $('#omitInput').val('');
            renderOmitList();
            processData();
        }
    }

    function removeOmission(index) {
        excludedNames.splice(index, 1);
        localStorage.setItem('cevaExclusions', JSON.stringify(excludedNames));
        renderOmitList();
        processData();
    }

    function renderOmitList() {
        $('#omitList').html('');
        excludedNames.forEach((name, i) => {
            $('#omitList').append(`<div class="omit-tag">${name} <span onclick="removeOmission(${i})">&times;</span></div>`);
        });
    }

    $('#supervisorFilter').on('change', processData);
    $(document).ready(initDashboard);
</script>
</body>
</html>
