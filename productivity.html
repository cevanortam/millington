<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEVA Productivity Leaderboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --ceva-blue: #002D72;
            --ceva-red: #E31837;
            --ceva-white: #FFFFFF;
            --bg-dark: #050a12;
        }

        html, body { 
            height: 100vh; width: 100vw; margin: 0; padding: 0;
            background-color: var(--bg-dark); color: var(--ceva-white);
            font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
        }

        body { display: flex; flex-direction: column; padding: 1vh; }

        .header-container {
            height: 10vh; display: flex; justify-content: space-between; align-items: center;
            background: var(--ceva-white); padding: 0 40px; border-radius: 10px;
            border-bottom: 6px solid var(--ceva-red); margin-bottom: 1vh; flex-shrink: 0;
        }

        .header-title h1 { color: var(--ceva-blue); margin: 0; font-weight: 900; font-size: 3.5vh; text-transform: uppercase; }
        .ceva-logo { height: 6vh; }

        .dashboard-main { display: flex; flex: 1; gap: 1vw; min-height: 0; }

        .left-panel { flex: 0.6; display: flex; flex-direction: column; gap: 1vh; min-height: 0; }
        .right-panel { flex: 0.4; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 1vh; display: flex; flex-direction: column; min-height: 0; }

        .chart-card { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 2vh; position: relative; min-height: 0; }
        .control-card { height: 8vh; background: var(--ceva-blue); padding: 1vh 2vh; border-radius: 12px; border-left: 5px solid var(--ceva-red); flex-shrink: 0; }

        .table-container { flex: 1; overflow-y: auto; min-height: 0; }
        .table-container::-webkit-scrollbar { width: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: var(--ceva-red); border-radius: 10px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
        th { background-color: var(--ceva-blue); color: white; text-transform: uppercase; padding: 1vh; font-size: 1.4vh; position: sticky; top: 0; z-index: 10; }
        td { padding: 1vh; background: rgba(255,255,255,0.03); font-size: 1.6vh; cursor: pointer; transition: 0.2s; }
        td:hover { background: rgba(255,255,255,0.1); }
        
        .rank-1 { background: var(--ceva-red) !important; color: white; font-weight: bold; }
        .rank-2, .rank-3 { background: rgba(0, 45, 114, 0.8) !important; }
        .total-col { color: #00d4ff; font-weight: bold; text-align: right; }

        .chart-instruction { font-size: 1.2vh; color: #888; font-style: italic; }
        #last-update { font-size: 1.4vh; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-title">
        <h1 id="mainHeader">Millington Performance</h1>
        <div id="last-update">Initializing...</div>
    </div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/14/CEVA_Logistics_logo.svg" class="ceva-logo" alt="CEVA Logo">
</div>

<div class="dashboard-main">
    <div class="left-panel">
        <div class="chart-card">
            <div class="d-flex justify-content-between align-items-center">
                <h4 id="chartTitle" style="color: var(--ceva-red); font-weight: bold; margin: 0;">Hourly Volume Trends</h4>
                <button class="btn btn-sm btn-outline-light" onclick="resetToTeam()" style="font-size: 1vh;">Reset to Team View</button>
            </div>
            <div style="position: absolute; top: 6vh; left: 1vh; right: 1vh; bottom: 1vh;">
                <canvas id="productivityChart"></canvas>
            </div>
        </div>
        
        <div class="control-card">
            <div class="row align-items-center h-100">
                <div class="col-6">
                    <label class="small text-uppercase fw-bold d-block" style="font-size: 1vh; color: #ccc;">Supervisor Filter</label>
                    <select id="supervisorFilter" class="form-select form-select-sm bg-dark text-white border-secondary"></select>
                </div>
                <div class="col-6 text-end">
                    <span class="chart-instruction">Tip: Click an Associate Name to see their individual chart.</span>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="table-container">
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Associate (Click Name)</th>
                        <th>Supv</th>
                        <th style="text-align: right;">Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQSCLwK71k52Yc_Sfnz3qzycsuHKn23n7ywFNEWzowh2jYCpfS23jpwz0po4E3b_OdLt6fkNAN-JEVU/pub?gid=0&single=true&output=csv';
    
    // --- 1. OMIT LIST: Add any names here to remove them from the dashboard ---
    const excludedNames = [
        "System Admin", 
        "Internal Test", 
        "Training Account",
        "Placeholder User"
    ];

    const hourLabels = ["4a", "5a", "6a", "7a", "8a", "9a", "10a", "11a", "12p", "1p", "2p", "3p", "4p", "5p", "6p", "7p", "8p", "9p", "10p", "11p", "12a", "1a", "2a", "3a"];

    let myChart, associateMap = {}, teamTotals = [];

    function initDashboard() {
        fetch(csvUrl).then(res => res.text()).then(csvText => {
            Papa.parse(csvText, {
                header: false,
                skipEmptyLines: true,
                complete: function(results) {
                    processData(results.data.slice(1));
                    setTimeout(initDashboard, 300000); 
                }
            });
        });
    }

    function processData(rawData) {
        const supervisors = new Set();
        teamTotals = new Array(24).fill(0);
        associateMap = {};

        let filteredData = rawData.filter(row => row[2] && !excludedNames.includes(row[2].trim()));
        filteredData.sort((a, b) => (parseFloat(b[29]) || 0) - (parseFloat(a[29]) || 0));

        let tableHtml = "";
        filteredData.forEach((row, index) => {
            supervisors.add(row[4]);
            
            // Map Associate hourly data
            let personalHours = [];
            for (let j = 5; j <= 28; j++) {
                let val = parseFloat(row[j]) || 0;
                personalHours.push(val);
                teamTotals[j-5] += val;
            }
            associateMap[row[2]] = personalHours;

            let rankClass = (index === 0) ? 'rank-1' : (index < 3) ? 'rank-2' : '';
            tableHtml += `<tr class="${rankClass}" onclick="updateChartForAssociate('${row[2]}')">
                <td style="width: 10%;">${index + 1}</td>
                <td style="width: 50%;">${row[2]}</td>
                <td style="width: 25%;">${row[4] || ''}</td>
                <td class="total-col" style="width: 15%;">${row[29]}</td>
            </tr>`;
        });

        $('#tableBody').html(tableHtml);
        $('#last-update').text("Last Update: " + new Date().toLocaleTimeString());
        
        if($('#supervisorFilter').children().length === 0) {
            $('#supervisorFilter').append('<option value="">Full Building</option>');
            Array.from(supervisors).sort().forEach(s => s && $('#supervisorFilter').append(`<option value="${s}">${s}</option>`));
        }

        resetToTeam(); // Default view
    }

    function updateChartForAssociate(name) {
        $('#chartTitle').text(name + " - Individual Performance");
        renderChart(hourLabels, associateMap[name], '#FFFFFF'); // Individual line is White
    }

    function resetToTeam() {
        $('#chartTitle').text("Team Hourly Flow");
        renderChart(hourLabels, teamTotals, '#E31837'); // Team line is CEVA Red
    }

    function renderChart(labels, data, lineColor) {
        if (myChart) myChart.destroy();
        const ctx = document.getElementById('productivityChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ 
                    data: data, 
                    borderColor: lineColor, 
                    backgroundColor: lineColor === '#FFFFFF' ? 'rgba(255,255,255,0.1)' : 'rgba(227, 24, 55, 0.2)', 
                    fill: true, tension: 0.4, pointRadius: 4, borderWidth: 5 
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                    x: { ticks: { color: '#888' }, grid: { display: false } }
                }
            }
        });
    }

    $(document).ready(initDashboard);
</script>
</body>
</html>
